# =====================================================================
# MindCrew Nginx 配置 · 静态资源 + 后端反代（SSE / WebSocket）
# =====================================================================

# WebSocket Upgrade 头：默认空，握手时改为 "upgrade"
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 上传文件上限要跟后端 spring.servlet.multipart 对齐
client_max_body_size 100m;

server {
    listen       80;
    server_name  localhost;
    charset      utf-8;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # 静态资源缓存（带 hash 文件名，1 年强缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── API 反代 ───
    # 后端服务名 backend、端口 8080（与 docker-compose.yml 对齐）
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;   # WebSocket 必备
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE 流式输出：关闭缓冲、放长超时
        proxy_buffering             off;
        proxy_request_buffering     off;
        proxy_read_timeout          600s;
        proxy_send_timeout          600s;
        chunked_transfer_encoding   on;
    }

    # ─── 上传文件直接代理给后端（头像、附件预览） ───
    location /uploads/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── WebSocket 实时语音识别等 ───
    location /ws/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Vue Router history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }
}
