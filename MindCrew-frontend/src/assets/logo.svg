<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- 十字竖臂 -->
  <rect x="25" y="5" width="14" height="54" rx="7" fill="white"/>
  <!-- 十字横臂 -->
  <rect x="5" y="25" width="54" height="14" rx="7" fill="white"/>

  <!-- 四角神经节点 -->
  <circle cx="11" cy="11" r="5" fill="white" opacity="0.55"/>
  <circle cx="53" cy="11" r="5" fill="white" opacity="0.55"/>
  <circle cx="11" cy="53" r="5" fill="white" opacity="0.55"/>
  <circle cx="53" cy="53" r="5" fill="white" opacity="0.55"/>

  <!-- 对角连线 -->
  <line x1="15" y1="15" x2="25" y2="25" stroke="white" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="49" y1="15" x2="39" y2="25" stroke="white" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="15" y1="49" x2="25" y2="39" stroke="white" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="49" y1="49" x2="39" y2="39" stroke="white" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>
