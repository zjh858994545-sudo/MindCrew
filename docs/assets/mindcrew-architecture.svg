<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2a44" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52627a"/>
    </marker>
    <style>
      .title{font:700 34px Arial,'Microsoft YaHei',sans-serif;fill:#152033}
      .sub{font:400 18px Arial,'Microsoft YaHei',sans-serif;fill:#5f6f87}
      .box{fill:#ffffff;stroke:#dbe5f4;stroke-width:1.4;rx:14;filter:url(#shadow)}
      .box2{fill:#f7fbff;stroke:#c9d9f0;stroke-width:1.2;rx:12}
      .h{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#18263a}
      .p{font:400 14px Arial,'Microsoft YaHei',sans-serif;fill:#617086}
      .tag{fill:#e8f1ff;stroke:#b9cff5;rx:999}
      .tagText{font:600 12px Arial,'Microsoft YaHei',sans-serif;fill:#315d9c}
      .line{stroke:#52627a;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="60" y="64" class="title">MindCrew 企业知识服务台 Agentic RAG 架构</text>
  <text x="60" y="96" class="sub">工单接入、智能检索、人工审核、Golden Pair、RAG Eval、Trace 可观测组成业务闭环</text>

  <rect x="60" y="150" width="190" height="110" class="box"/>
  <text x="88" y="190" class="h">服务台工单</text>
  <text x="88" y="220" class="p">HR / IT / 财务 / 安全</text>
  <text x="88" y="242" class="p">真实业务入口</text>

  <rect x="315" y="135" width="220" height="140" class="box"/>
  <text x="348" y="176" class="h">MindCrewAgent</text>
  <text x="348" y="207" class="p">安全检查、会话、工具编排</text>
  <text x="348" y="230" class="p">SSE 流式生成</text>
  <rect x="348" y="244" width="96" height="22" class="tag"/>
  <text x="364" y="260" class="tagText">Agent Core</text>

  <rect x="600" y="90" width="240" height="120" class="box"/>
  <text x="630" y="130" class="h">QueryPlanner</text>
  <text x="630" y="160" class="p">intent / variants / HyDE</text>
  <text x="630" y="182" class="p">低置信度 retry policy</text>

  <rect x="600" y="250" width="240" height="160" class="box"/>
  <text x="630" y="290" class="h">RAG Retrieval</text>
  <text x="630" y="320" class="p">Milvus 向量召回</text>
  <text x="630" y="342" class="p">MySQL BM25 召回</text>
  <text x="630" y="364" class="p">RRF 融合 + Rerank</text>

  <rect x="910" y="155" width="230" height="135" class="box"/>
  <text x="942" y="196" class="h">AI 答复草稿</text>
  <text x="942" y="226" class="p">引用来源、置信度</text>
  <text x="942" y="248" class="p">Trace ID、事件时间线</text>

  <rect x="910" y="365" width="230" height="145" class="box"/>
  <text x="942" y="404" class="h">人工审核</text>
  <text x="942" y="434" class="p">采纳：Golden Pair</text>
  <text x="942" y="456" class="p">驳回：Knowledge Gap</text>
  <text x="942" y="478" class="p">质量闸门</text>

  <rect x="600" y="505" width="240" height="115" class="box"/>
  <text x="630" y="544" class="h">RAG Eval</text>
  <text x="630" y="574" class="p">动态评测 Case</text>
  <text x="630" y="596" class="p">Recall@K / MRR / Hit@K</text>

  <rect x="315" y="430" width="220" height="130" class="box"/>
  <text x="348" y="470" class="h">Agent Trace</text>
  <text x="348" y="500" class="p">QueryPlanner / Retrieval</text>
  <text x="348" y="522" class="p">Rerank / LLM / Safety Span</text>

  <rect x="60" y="430" width="190" height="130" class="box"/>
  <text x="88" y="470" class="h">MCP Governance</text>
  <text x="88" y="500" class="p">tool policy</text>
  <text x="88" y="522" class="p">rate limit / audit log</text>

  <path d="M250 205 H315" class="line"/>
  <path d="M535 205 C565 205 570 150 600 150" class="line"/>
  <path d="M720 210 V250" class="line"/>
  <path d="M840 330 C875 330 875 222 910 222" class="line"/>
  <path d="M1025 290 V365" class="line"/>
  <path d="M910 438 C865 438 865 562 840 562" class="line"/>
  <path d="M600 562 H535" class="line"/>
  <path d="M425 430 V275" class="line"/>
  <path d="M250 495 H315" class="line"/>

  <rect x="72" y="635" width="1136" height="42" class="box2"/>
  <text x="95" y="662" class="p">闭环价值：业务入口可演示，RAG 效果可评测，Agent 链路可追踪，工具调用可治理，失败样本可持续优化。</text>
</svg>
