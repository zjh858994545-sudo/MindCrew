  <line x1="110" y1="610" x2="520" y2="610" stroke="#d9e3f2"/>
  <g transform="translate(125,350)">
    <rect x="0" y="140" width="54" height="120" class="bar1"/>
    <rect x="70" y="95" width="54" height="165" class="bar2"/>
    <rect x="140" y="62" width="54" height="198" class="bar3"/>
    <rect x="210" y="28" width="54" height="232" class="bar4"/>
    <text x="-8" y="286" class="tiny">Vector</text>
    <text x="68" y="286" class="tiny">BM25</text>
    <text x="142" y="286" class="tiny">Hybrid</text>
    <text x="200" y="286" class="tiny">Rerank</text>
  </g>
  <text x="380" y="358" class="tiny">Recall@K</text>
  <text x="380" y="386" class="tiny">MRR</text>
  <text x="380" y="414" class="tiny">CitationHit</text>
  <text x="380" y="442" class="tiny">RefusalAccuracy</text>

  <rect x="610" y="270" width="525" height="390" class="panel"/>
  <text x="640" y="310" class="s">动态评测 Case</text>
  <rect x="640" y="340" width="460" height="76" rx="8" fill="#f8fbff" stroke="#e0e8f3"/>
  <text x="660" y="368" class="s">db_case_42 · service_desk_security</text>
  <text x="660" y="394" class="p">客户要求导出全量原始日志，是否可以邮件发送？</text>
