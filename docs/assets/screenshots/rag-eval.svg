  <text x="363" y="205" style="font:700 34px Arial;fill:#152033">13</text>
  <rect x="610" y="130" width="250" height="100" class="panel"/>
  <text x="638" y="168" class="tiny">Best Strategy</text>
  <text x="638" y="205" style="font:700 24px Arial;fill:#2563eb">HYBRID_RERANK</text>
  <rect x="885" y="130" width="250" height="100" class="panel"/>
  <text x="913" y="168" class="tiny">Report</text>
  <text x="913" y="205" style="font:700 20px Arial;fill:#16a34a">evaluation_report.json</text>

  <rect x="60" y="270" width="510" height="390" class="panel"/>
