  <rect x="640" y="530" width="460" height="76" rx="8" fill="#f8fbff" stroke="#e0e8f3"/>
  <text x="660" y="558" class="s">golden_qa_IT</text>
  <text x="660" y="584" class="p">MFA 失败时如何处理账号登录问题？</text>
