# =====================================================================
# MindCrew · 全栈一键部署
#   命令：
#     cp .env.docker.example .env       # 第一次部署：复制环境变量模板
#     vim .env                          # 填入 BAILIAN_API_KEY 等真实密钥
#     docker compose up -d --build      # 启动（首次会构建前后端镜像）
#     docker compose logs -f backend    # 看后端日志
#     docker compose down               # 停止（保留数据卷）
#     docker compose down -v            # 停止并清空数据（慎用！）
# =====================================================================

name: mindcrew

networks:
  mindcrew-net:
    driver: bridge

volumes:
  mindcrew_mysql_data:
  mindcrew_redis_data:
  mindcrew_minio_data:
  mindcrew_etcd_data:
  mindcrew_milvus_data:
  mindcrew_backend_uploads:
  mindcrew_backend_logs:

services:
  # ═══════════════════════════════════════════════════════════════
  # MySQL 8 · 业务库 docmind
  # ═══════════════════════════════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: mindcrew-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: docmind
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --max_allowed_packet=64M
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mindcrew_mysql_data:/var/lib/mysql
      # 把项目根目录下 sql/ 整个挂进来，由 init.sh 按文档顺序执行
      - ./sql:/sql-source:ro
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [mindcrew-net]

  # ═══════════════════════════════════════════════════════════════
  # Redis 7 · 缓存 + Session + 限流
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: mindcrew-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
               redis-server --save 60 1 --loglevel warning --requirepass "$$REDIS_PASSWORD";
             else
               redis-server --save 60 1 --loglevel warning;
             fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - mindcrew_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [mindcrew-net]

  # ═══════════════════════════════════════════════════════════════
  # MinIO · 对象存储（也是 Milvus 的依赖）
  # ═══════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: mindcrew-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - mindcrew_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mindcrew-net]

  # ─── MinIO bucket 一次性初始化 ───
  # 创建业务 bucket `mindcrew`，跑完即退出
  minio-init:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    container_name: mindcrew-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      sh -c '
      set -e;
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
      mc mb --ignore-existing local/mindcrew;
      mc anonymous set download local/mindcrew;
      echo "MinIO bucket mindcrew ready.";
      '
    networks: [mindcrew-net]
    restart: "no"

  # ═══════════════════════════════════════════════════════════════
  # etcd · Milvus 的元数据存储
  # ═══════════════════════════════════════════════════════════════
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: mindcrew-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - mindcrew_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mindcrew-net]

  # ═══════════════════════════════════════════════════════════════
  # Milvus 2.3 · 向量数据库（standalone 单机模式）
  # ═══════════════════════════════════════════════════════════════
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: mindcrew-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - mindcrew_milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [mindcrew-net]

  # ═══════════════════════════════════════════════════════════════
  # 后端 · Spring Boot
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mindcrew/backend:latest
    container_name: mindcrew-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # ─── JVM ───
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx2048m -XX:+UseG1GC}
      TZ: Asia/Shanghai

      # ─── 用 Spring Boot relaxed binding 覆盖 application.yml ───
      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/docmind?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530

      # MinIO（容器间走内网域名 minio:9000）
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: mindcrew

      # 存储模式
      STORAGE_TYPE: ${STORAGE_TYPE:-minio}

      # 阿里云 OSS（STORAGE_TYPE=oss 时生效）
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_REGION: ${OSS_REGION:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-}

      # 加密 & 鉴权
      CRYPTO_MASTER_KEY: ${CRYPTO_MASTER_KEY:-please-change-me-in-production-32chars-min}
      JWT_SECRET: ${JWT_SECRET:-MindCrew2026SecretKeyForJWTTokenGenerationPleaseChangeInProduction}

      # 大模型 / Web 搜索
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:?需要在 .env 里填入阿里云百炼 API Key}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      MINDCREW_WEB_SEARCH_ENABLED: ${MINDCREW_WEB_SEARCH_ENABLED:-true}

      # 阿里账单（可选）
      BSS_ENABLED: ${BSS_ENABLED:-false}
      BSS_ACCESS_KEY: ${BSS_ACCESS_KEY:-}
      BSS_SECRET_KEY: ${BSS_SECRET_KEY:-}

      # 镜像里已装 LibreOffice + FFmpeg，给出绝对路径
      OFFICE_SOFFICE_PATH: /usr/bin/soffice
      VIDEO_FFMPEG_PATH: /usr/bin/ffmpeg
      VIDEO_FFPROBE_PATH: /usr/bin/ffprobe
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - mindcrew_backend_uploads:/app/uploads
      - mindcrew_backend_logs:/app/logs
    networks: [mindcrew-net]

  # ═══════════════════════════════════════════════════════════════
  # 前端 · Vue 3 + Nginx
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./MindCrew-frontend
      dockerfile: Dockerfile
    image: mindcrew/frontend:latest
    container_name: mindcrew-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks: [mindcrew-net]
